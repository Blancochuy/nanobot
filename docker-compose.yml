version: '3.8'

services:
  init-config:
    image: busybox
    volumes:
      - nanobot_data:/root/.nanobot
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    command:
      - sh
      - -c
      - |
        cat <<EOF > /root/.nanobot/config.json
        {
          "providers": {
            "openai": {
              "api_key": "${GROQ_API_KEY}",
              "base_url": "https://api.groq.com/openai/v1"
            }
          },
          "model": "moonshotai/Kimi-K2-Instruct-0905"
        }
        EOF

  nanobot-gateway:
    container_name: nanobot-gateway
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - nanobot_data:/root/.nanobot
    command:
      - gateway
    restart: always
    ports:
      - '18790:18790'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  nanobot_data:
